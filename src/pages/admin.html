<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinPoint — Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --purple: #9100BD;
            --purple-light: #B44DD9;
            --purple-dark: #6E008F;
            --purple-bg: #F8F0FC;
            --green: #22c55e;
            --red: #ef4444;
            --dark: #1a1a2e;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            min-height: 100vh;
        }

        /* ====== LOGIN SCREEN ====== */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 50%, var(--purple-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            width: 400px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }

        .login-card h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--purple);
            margin-bottom: 8px;
        }

        .login-card p {
            font-size: 14px;
            color: var(--gray-400);
            margin-bottom: 32px;
        }

        .login-card input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-card input:focus {
            border-color: var(--purple);
        }

        .login-card .error {
            color: var(--red);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .login-card button {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .login-card button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(145, 0, 189, 0.4);
        }

        .login-hidden {
            display: none !important;
        }

        /* ====== HEADER ====== */
        .header {
            background: linear-gradient(135deg, var(--purple-dark), var(--purple));
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .header .logout-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .header .logout-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ====== CONTENT ====== */
        .content {
            max-width: 1000px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--gray-100);
        }

        .stat-card .label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-400);
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 800;
            color: var(--gray-800);
        }

        .stat-card .value.green {
            color: var(--green);
        }

        .stat-card .value.red {
            color: var(--red);
        }

        /* ====== TABLE ====== */
        .table-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--gray-100);
        }

        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .table-header .refresh-btn {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--gray-600);
            transition: background 0.2s;
        }

        .table-header .refresh-btn:hover {
            background: var(--gray-100);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 14px 24px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-400);
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-100);
        }

        tbody td {
            padding: 16px 24px;
            font-size: 14px;
            border-bottom: 1px solid var(--gray-100);
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--gray-50);
        }

        .team-name {
            font-weight: 600;
            color: var(--gray-800);
        }

        .team-id {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 2px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.active {
            background: #dcfce7;
            color: #15803d;
        }

        .status-badge.inactive {
            background: #fee2e2;
            color: #b91c1c;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-badge.active .dot {
            background: var(--green);
        }

        .status-badge.inactive .dot {
            background: var(--red);
        }

        .date-text {
            font-size: 13px;
            color: var(--gray-400);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-activate {
            background: var(--green);
            color: white;
        }

        .btn-deactivate {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .btn-delete {
            background: var(--gray-50);
            color: var(--red);
            border: 1px solid var(--gray-200);
        }

        .btn-delete:hover {
            background: #fee2e2;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--gray-400);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-400);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--gray-800);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 200;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 640px) {
            .stats-row {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 16px 20px;
            }

            .content {
                padding: 0 16px;
                margin: 20px auto;
            }

            thead th,
            tbody td {
                padding: 12px 16px;
            }

            .actions {
                flex-direction: column;
                gap: 4px;
            }
        }
    </style>
</head>

<body>
    <!-- LOGIN -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <h1>📌 PinPoint Admin</h1>
            <p>Enter your admin password to continue</p>
            <input type="password" id="passwordInput" placeholder="Admin password" autocomplete="off">
            <div class="error" id="loginError">Invalid password. Try again.</div>
            <button onclick="attemptLogin()">Sign In</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="header" id="dashboard" style="display:none;">
        <div class="header-left">
            <h1>📌 PinPoint Admin</h1>
            <span class="badge">Workspace Manager</span>
        </div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>

    <div class="content" id="mainContent" style="display:none;">
        <div class="stats-row">
            <div class="stat-card">
                <div class="label">Total Workspaces</div>
                <div class="value" id="totalCount">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Active</div>
                <div class="value green" id="activeCount">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Deactivated</div>
                <div class="value red" id="inactiveCount">—</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">
                <h2>Installed Workspaces</h2>
                <button class="refresh-btn" onclick="loadWorkspaces()">↻ Refresh</button>
            </div>
            <div id="tableBody">
                <div class="loading">Loading workspaces...</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let adminSecret = '';
        let workspaces = [];

        // ====== AUTH ======
        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        async function attemptLogin() {
            const password = document.getElementById('passwordInput').value.trim();
            if (!password) return;

            adminSecret = password;

            try {
                const res = await fetch('/api/admin/workspaces', {
                    headers: { 'X-Admin-Secret': password }
                });

                if (res.status === 401) {
                    document.getElementById('loginError').style.display = 'block';
                    adminSecret = '';
                    return;
                }

                // Success — show dashboard
                document.getElementById('loginOverlay').classList.add('login-hidden');
                document.getElementById('dashboard').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'block';

                const data = await res.json();
                renderWorkspaces(data.workspaces);
            } catch (err) {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('loginError').textContent = 'Connection error. Try again.';
                adminSecret = '';
            }
        }

        function logout() {
            adminSecret = '';
            document.getElementById('loginOverlay').classList.remove('login-hidden');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        // ====== WORKSPACES ======
        async function loadWorkspaces() {
            try {
                const res = await fetch('/api/admin/workspaces', {
                    headers: { 'X-Admin-Secret': adminSecret }
                });
                const data = await res.json();
                renderWorkspaces(data.workspaces);
            } catch (err) {
                showToast('Failed to load workspaces');
            }
        }

        function renderWorkspaces(data) {
            workspaces = data || [];

            // Update stats
            document.getElementById('totalCount').textContent = workspaces.length;
            document.getElementById('activeCount').textContent = workspaces.filter(w => w.active === 1).length;
            document.getElementById('inactiveCount').textContent = workspaces.filter(w => w.active === 0).length;

            const container = document.getElementById('tableBody');

            if (workspaces.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>No workspaces have installed PinPoint yet.</p>
                    </div>`;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Workspace</th>
                            <th>Status</th>
                            <th>Installed</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>`;

            workspaces.forEach(w => {
                const isActive = w.active === 1;
                const installed = w.installed_at ? new Date(w.installed_at).toLocaleDateString('en-US', {
                    month: 'short', day: 'numeric', year: 'numeric'
                }) : '—';

                html += `
                    <tr>
                        <td>
                            <div class="team-name">${escapeHtml(w.team_name || 'Unknown')}</div>
                            <div class="team-id">${escapeHtml(w.team_id)}</div>
                        </td>
                        <td>
                            <span class="status-badge ${isActive ? 'active' : 'inactive'}">
                                <span class="dot"></span>
                                ${isActive ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td><span class="date-text">${installed}</span></td>
                        <td>
                            <div class="actions">
                                ${isActive
                        ? `<button class="btn btn-deactivate" onclick="toggleWorkspace('${w.team_id}', false)">Deactivate</button>`
                        : `<button class="btn btn-activate" onclick="toggleWorkspace('${w.team_id}', true)">Activate</button>`
                    }
                                <button class="btn btn-delete" onclick="removeWorkspace('${w.team_id}', '${escapeHtml(w.team_name || w.team_id)}')">Delete</button>
                            </div>
                        </td>
                    </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function toggleWorkspace(teamId, active) {
            try {
                const res = await fetch(`/api/admin/workspaces/${teamId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Secret': adminSecret
                    },
                    body: JSON.stringify({ active })
                });

                if (!res.ok) throw new Error('Failed');

                showToast(active ? '✅ Workspace activated' : '⛔ Workspace deactivated');
                await loadWorkspaces();
            } catch (err) {
                showToast('Failed to update workspace');
            }
        }

        async function removeWorkspace(teamId, name) {
            if (!confirm(`Permanently delete workspace "${name}"?\n\nThis will remove all their installation data. This action cannot be undone.`)) {
                return;
            }

            try {
                const res = await fetch(`/api/admin/workspaces/${teamId}`, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Secret': adminSecret }
                });

                if (!res.ok) throw new Error('Failed');

                showToast('🗑️ Workspace removed');
                await loadWorkspaces();
            } catch (err) {
                showToast('Failed to delete workspace');
            }
        }

        // ====== UTILS ======
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>

</html>
